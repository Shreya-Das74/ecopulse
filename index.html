<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoPulse — Personal Carbon Tracker & AI Coach</title>
  <meta name="description" content="An empathetic, privacy-first, and highly efficient carbon footprint tracker and personalized sustainability coach.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Skip to content link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Accessible Header -->
  <header>
    <div class="header-container">
      <a href="#" class="logo" aria-label="EcoPulse Home">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/>
          <path d="M12 6V12L16 14"/>
        </svg>
        <span>EcoPulse</span>
      </a>
      
      <!-- Nav Menu (Only active when user is onboarded) -->
      <nav aria-label="Main Navigation" id="main-nav" style="display: none;">
        <ul class="nav-links">
          <li>
            <button class="nav-link-btn active" id="nav-dashboard" aria-current="page">
              Dashboard
            </button>
          </li>
          <li>
            <button class="nav-link-btn" id="nav-actions">
              Micro-Actions
            </button>
          </li>
          <li>
            <button class="nav-link-btn btn-danger" id="nav-reset" style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">
              Reset Profile
            </button>
          </li>
        </ul>
      </nav>

      <!-- Streak Indicator (Hidden initially) -->
      <div id="streak-indicator" class="coach-stat-pill" style="display: none;" aria-label="Sustainability Action Streak">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="stroke: var(--accent-primary);">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </svg>
        <span id="streak-count" aria-live="polite">0 Day Streak</span>
      </div>
    </div>
  </header>

  <!-- Accessibility announcement container for screen readers -->
  <div id="screen-reader-announcer" class="sr-only" aria-live="assertive"></div>

  <!-- Main Content Area -->
  <main id="main-content" tabindex="-1">
    <div id="app-root">
      <!-- Dynamic components render here -->
      <div class="text-center" style="padding: 3rem 0;">
        <p>Loading EcoPulse...</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2026 EcoPulse Carbon Coach. Your data remains secure & local on this device.</p>
    </div>
  </footer>

  <!-- App Bootstrap JS -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
